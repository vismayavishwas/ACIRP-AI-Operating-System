name: CI Pipeline

on:
  push:
    branches: [ main, master, comp-unstop ]
  pull_request:
    branches: [ main, master, comp-unstop ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Flake8 Lint Check
        run: |
          flake8 backend/ --config=backend/.flake8

      - name: Run Pytest with Coverage
        run: |
          cd backend
          pytest tests -v --cov=. --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: pytest-coverage
          path: backend/coverage.xml

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint Check
        run: |
          cd frontend
          npm run lint

      - name: Build frontend
        run: |
          cd frontend
          VITE_API_BASE_URL=https://acirp-backend.onrender.com npm run build

  docker-builds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Write dummy .env for compose config parser validation in CI context
      - name: Create dummy .env for Build
        run: |
          echo "GEMINI_API_KEY=dummy-key-for-compilation" > backend/.env

      - name: Build containers via Docker Compose
        run: |
          docker compose build

  frontend-deploy:
    needs: [frontend-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/comp-unstop' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Build Frontend
        run: |
          cd frontend
          npm ci
          VITE_API_BASE_URL=https://acirp-backend.onrender.com npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ACIRP_UNSTOP }}
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT != '' }}
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_ACIRP_UNSTOP }}'
          projectId: acirp-unstop
          channelId: live

